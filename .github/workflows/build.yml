name: Build Forge 1.8.9

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: RenderExtender-1.8.9
          path: build/libs/*.jar
