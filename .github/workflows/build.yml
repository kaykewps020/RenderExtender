name: Build RenderExtender 1.8.9 (Forge)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: 🔨 Buildar com Gradle Wrapper
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: 📦 Upload .jar
        uses: actions/upload-artifact@v4
        with:
          name: RenderExtender-Forge-1.8.9
          path: build/libs/*.jar
          if-no-files-found: error

      - name: 📋 Listar
        run: ls -lh build/libs/
