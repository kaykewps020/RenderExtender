name: Build RenderExtender 1.8.9 (Forge)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          java-package: jdk

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 4.4.1

      - name: 🔨 Gerar Wrapper e Buildar
        run: |
          gradle wrapper --gradle-version 4.4.1
          chmod +x gradlew
          export GRADLE_OPTS="-Xmx2G"
          ./gradlew build --no-daemon --stacktrace

      - name: 📦 Upload .jar
        uses: actions/upload-artifact@v4
        with:
          name: RenderExtender-Forge-1.8.9
          path: build/libs/*.jar
          if-no-files-found: error

      - name: 📋 Listar
        run: ls -lh build/libs/ || echo "build/libs not found"
